  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

5F2;}\n  *{box-sizing:border-box;}\n  ::selection{background:#8A2D3B;color:#fff;}\n  @keyframes scrollbob{0%,100%{transform:translateY(0);}50%{transform:translateY(7px);}}\n  image-slot{--is-bg:#ECEBE6;--is-fg:#9a9a95;}\n  [data-rail]::-webkit-scrollbar{height:0;display:none;}\n  [data-rail]{scrollbar-width:none;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--accent: {{ accent }};font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:#161616;background:#F6F5F2;height:100vh;overflow-y:auto;scroll-behavior:smooth;\">\n\n  <a href=\"#home\" aria-label=\"Back to home\" style=\"position:fixed;left:clamp(28px,5vw,72px);top:22vh;z-index:210;display:inline-flex;align-items:center;will-change:transform;\">\n    <img id=\"brandLogo\" src=\"379a02d6-3fbf-4557-966d-ae76b9592015\" alt=\"Marvel home\" style=\"height:clamp(150px,50vh,520px);width:auto;display:block;\">\n  <\u002Fa>\n\n  <nav style=\"position:sticky;top:0;z-index:200;display:flex;justify-content:flex-end;align-items:center;padding:16px clamp(28px,5vw,72px);background:rgba(246,245,242,0.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #E6E5DF;\">\n    <div style=\"display:flex;align-items:center;gap:clamp(20px,3vw,46px);font-size:15px;font-weight:600;letter-spacing:-0.01em;\">\n      <a href=\"#about\" style=\"color:#161616;text-decoration:none;transition:color .2s ease;\" style-hover=\"color:var(--accent,#8A2D3B)\">About<\u002Fa>\n      <a href=\"#experience\" style=\"color:#161616;text-decoration:none;transition:color .2s ease;\" style-hover=\"color:var(--accent,#8A2D3B)\">Experience<\u002Fa>\n      <a href=\"#work\" style=\"color:#161616;text-decoration:none;transition:color .2s ease;\" style-hover=\"color:var(--accent,#8A2D3B)\">Projects<\u002Fa>\n      <a href=\"#contact\" style=\"color:#161616;text-decoration:none;transition:color .2s ease;\" style-hover=\"color:var(--accent,#8A2D3B)\">Contact<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <section id=\"home\" style=\"scroll-margin-top:74px;min-height:calc(100vh - 59px);display:grid;grid-template-columns:1fr 1fr;align-items:center;column-gap:clamp(24px,4vw,64px);padding:clamp(32px,5vh,64px) clamp(28px,5vw,72px) clamp(28px,4vh,48px);\">\n    <div aria-hidden=\"true\"><\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;align-items:flex-start;min-width:0;\">\n      <h1 style=\"margin:0;font-family:'Archivo','Helvetica Neue',Arial,sans-serif;font-weight:900;font-size:clamp(34px,5.2vw,88px);line-height:0.98;letter-spacing:-0.03em;text-align:left;\">Where concepts meet conviction<\u002Fh1>\n      <p style=\"margin:24px 0 0;font-size:clamp(15px,1.3vw,19px);line-height:1.4;color:#6b6b66;max-width:440px;\">Ideas that earn their place.<\u002Fp>\n      <div style=\"display:flex;gap:28px;color:#6b6b66;font-size:clamp(13px,1.1vw,16px);margin-top:28px;flex-wrap:wrap;\">\n        <span>mc.tzean@gmail.com<\u002Fspan>\n        <span>Singapore, SG<\u002Fspan>\n      <\u002Fdiv>\n      <a href=\"#about\" aria-label=\"Scroll to about\" style=\"margin-top:clamp(36px,7vh,68px);display:inline-flex;flex-direction:column;gap:12px;align-items:flex-start;text-decoration:none;color:#161616;transition:color .2s ease;\" style-hover=\"color:var(--accent,#8A2D3B)\">\n        <span style=\"font-size:12px;font-weight:600;letter-spacing:0.24em;text-transform:uppercase;color:#9a9a95;\">Scroll<\u002Fspan>\n        <span style=\"font-size:22px;line-height:1;animation:scrollbob 1.8s ease-in-out infinite;\">↓<\u002Fspan>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"about\" style=\"scroll-margin-top:74px;min-height:100vh;display:flex;align-items:center;padding:clamp(72px,12vh,150px) clamp(28px,5vw,72px);border-top:1px solid #E6E5DF;\">\n    <div style=\"max-width:1480px;margin:0 auto;width:100%;\">\n      <div style=\"display:grid;grid-template-columns:minmax(0,440px) 1fr;gap:clamp(40px,5vw,88px);align-items:center;\">\n        <div style=\"aspect-ratio:4/5;overflow:hidden;border-radius:10px;background:#ECEBE6;\">\n          <image-slot id=\"marvel-portrait\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop a portrait or studio photo\" style=\"width:100%;height:100%;display:block;transition:transform .6s cubic-bezier(.2,.7,.2,1);\" style-hover=\"transform:scale(1.04)\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div style=\"min-width:0;\">\n          <div style=\"font-size:13px;letter-spacing:0.02em;color:#9a9a95;margin-bottom:18px;\"><span style=\"color:var(--accent,#8A2D3B);font-weight:700;\">(01)<\u002Fspan>&nbsp;&nbsp;About<\u002Fdiv>\n          <h2 style=\"margin:0;font-family:'Archivo','Helvetica Neue',Arial,sans-serif;font-weight:900;font-size:clamp(40px,6.6vw,92px);line-height:0.92;letter-spacing:-0.04em;\">Hello!<br>I'm Marvel<\u002Fh2>\n          <p style=\"margin:30px 0 0;font-size:clamp(18px,1.5vw,22px);line-height:1.4;max-width:640px;color:#2a2a28;font-weight:500;letter-spacing:-0.01em;\">A marketing student at SUSS working where brand strategy meets storytelling, majoring in Marketing with a minor in Digital Content.<\u002Fp>\n          <p style=\"margin:18px 0 0;font-size:16px;line-height:1.65;max-width:600px;color:#6b6b66;\">I build brands that actually say something: identities and editorial work that pair sharp thinking with a clear point of view. I care less about chasing the feed and more about the story a brand tells when no one is scrolling.<\u002Fp>\n          <div style=\"margin-top:34px;display:flex;flex-wrap:wrap;gap:10px;\">\n            <span style=\"font-size:14px;font-weight:600;border:1px solid #d9d8d1;border-radius:999px;padding:7px 16px;\">Brand Identity<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:600;border:1px solid #d9d8d1;border-radius:999px;padding:7px 16px;\">Art Direction<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:600;border:1px solid #d9d8d1;border-radius:999px;padding:7px 16px;\">Storytelling<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:600;border:1px solid #d9d8d1;border-radius:999px;padding:7px 16px;\">Editorial &amp; Layout<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:600;border:1px solid #d9d8d1;border-radius:999px;padding:7px 16px;\">Creative Strategy<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:clamp(56px,9vh,110px);border-top:1px solid #E6E5DF;padding-top:clamp(36px,5vh,64px);\">\n        <div style=\"font-size:13px;letter-spacing:0.02em;color:#9a9a95;margin-bottom:clamp(16px,2vh,22px);\"><span style=\"color:var(--accent,#8A2D3B);font-weight:700;\">•<\u002Fspan>&nbsp;&nbsp;Approach<\u002Fdiv>\n        <h3 style=\"margin:0 0 clamp(32px,5vh,56px);font-family:'Archivo','Helvetica Neue',Arial,sans-serif;font-weight:900;font-size:clamp(30px,4.6vw,60px);line-height:0.95;letter-spacing:-0.03em;\">My Design Philosophy<\u002Fh3>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:clamp(28px,4vw,56px);\">\n        <div>\n          <div style=\"font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent,#8A2D3B);font-weight:700;margin-bottom:12px;\">01<\u002Fdiv>\n          <div style=\"font-size:19px;font-weight:700;letter-spacing:-0.01em;margin-bottom:10px;\">Strategy<\u002Fdiv>\n          <p style=\"margin:0;font-size:15px;line-height:1.6;color:#6b6b66;\">I start with the idea, not the asset. Positioning, tone and the single thought a brand should own before a pixel is drawn.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent,#8A2D3B);font-weight:700;margin-bottom:12px;\">02<\u002Fdiv>\n          <div style=\"font-size:19px;font-weight:700;letter-spacing:-0.01em;margin-bottom:10px;\">Craft<\u002Fdiv>\n          <p style=\"margin:0;font-size:15px;line-height:1.6;color:#6b6b66;\">Type, layout and identity systems that hold up across a poster 3B)\">mc.tzean@gmail.com<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:30px;font-size:15px;\">\n          <a href=\"#\" style=\"color:#161616;text-decoration:none;border-bottom:1px solid #d4d3cc;padding-bottom:3px;transition:color .25s ease,border-color .25s ease;\" style-hover=\"color:var(--accent,#8A2D3B);border-color:var(--accent,#8A2D3B)\">LinkedIn<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 900 },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#8A2D3B&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this._onScroll = this._onScroll.bind(this);\n    this._onArrow = this._onArrow.bind(this);\n    this._onResize = this._onResize.bind(this);\n    this._raf = null;\n    this._ticking = false;\n    this._geom = null;\n  }\n  componentDidMount() {\n    const setup = () => {\n      const home = document.getElementById('home');\n      const img = document.getElementById('brandLogo');\n      if (!home || !img) { this._t = setTimeout(setup, 60); return; }\n      this._scroller = home.parentElement;\n      this._logo = img;\n      this._anchor = img.parentElement;\n      if (this._anchor) this._anchor.style.transformOrigin = 'top left';\n      this._scroller.addEventListener('scroll', this._onScroll, { passive: true });\n      this._scroller.addEventListener('click', this._onArrow);\n      window.addEventListener('resize', this._onResize);\n      this._measure();\n      this._update();\n    };\n    setup();\n  }\n  componentWillUnmount() {\n    if (this._t) clearTimeout(this._t);\n    if (this._scroller) {\n      this._scroller.removeEventListener('scroll', this._onScroll);\n      this._scroller.removeEventListener('click', this._onArrow);\n    }\n    window.removeEventListener('resize', this._onResize);\n    if (this._raf) cancelAnimationFrame(this._raf);\n    if (this._anim) cancelAnimationFrame(this._anim);\n  }\n  // Scroll fires often; coalesce to one transform write per frame.\n  _onScroll() {\n    if (this._ticking) return;\n    this._ticking = true;\n    this._raf = requestAnimationFrame(() => {\n      this._ticking = false;\n      this._update();\n    });\n  }\n  _onResize() {\n    this._measure();\n    this._update();\n  }\n  // Layout-touching work (reads + size/position writes) runs only on\n  // mount/resize, not on every scroll.\n  _measure() {\n    const sc = this._scroller, img = this._logo, a = this._anchor;\n    if (!sc || !img) return;\n    const vw = sc.clientWidth || window.innerWidth;\n    const vh = sc.clientHeight || window.innerHeight;\n    const pad = Math.min(Math.max(vw * 0.05, 28), 72);\n    const maxByW = (vw * 0.5 - pad * 1.5) / 1.2;\n    const bigH = Math.max(140, Math.min(vh * 0.56, maxByW, 540));\n    const smallH = 26;\n    const topStart = Math.max((vh - bigH) / 2, 70);\n    img.style.height = bigH + 'px';\n    if (a) a.style.top = topStart + 'px';\n    this._geom = { range: Math.max(vh * 0.45, 1), scaleEnd: smallH / bigH, shiftY: 16 - topStart };\n  }\n  // Scroll-time work: a single composited transform, no layout.\n  _update() {\n    const sc = this._scroller, a = this._anchor, g = this._geom;\n    if (!sc || !a || !g) return;\n    const p = Math.min(Math.max(sc.scrollTop / g.range, 0), 1);\n    const e = p * p * (3 - 2 * p); // smoothstep\n    const s = 1 + (g.scaleEnd - 1) * e;\n    a.style.transform = 'translateY(' + (g.shiftY * e) + 'px) scale(' + s + ')';\n  }\n  _onArrow(e) {\n    const btn = e.target.closest && e.target.closest('[data-scroll]');\n    if (!btn) return;\n    const cat = btn.closest('[data-cat]');\n    const rail = cat && cat.querySelector('[data-rail]');\n    if (!rail) return;\n    const dir = btn.getAttribute('data-scroll') === 'next' ? 1 : -1;\n    const amt = Math.max(rail.clientWidth * 0.82, 300);\n    const maxLeft = rail.scrollWidth - rail.clientWidth;\n    const start = rail.scrollLeft;\n    const target = Math.min(Math.max(start + dir * amt, 0), maxLeft);\n    if (rail._anim) cancelAnimationFrame(rail._anim);\n    const dur = 420, t0 = performance.now();\n    const step = (now) => {\n      const p = Math.min((now - t0) / dur, 1);\n      const eased = p < 0.5 ? 2 * p * p : 1 - Math.pow(-2 * p + 2, 2) / 2;\n      rail.scrollLeft = start + (target - start) * eased;\n      if (p < 1) rail._anim = requestAnimationFrame(step);\n    };\n    rail._anim = requestAnimationFrame(step);\n  }\n  renderVals() {\n    return {\n      accent: this.props.accent ?? '#8A2D3B',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
